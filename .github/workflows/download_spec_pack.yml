name: Download Transparent Background Wheels (CPU)

on:
  workflow_dispatch: # 手動觸發

jobs:
  download-wheels:
    runs-on: windows-latest

    steps:
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download all wheels
        run: |
          mkdir packages
          # 1. 下載 CPU 版 Torch 系列 (指定存放於 ./packages)
          pip download torch torchvision torchaudio `
            --index-url https://download.pytorch.org/whl/cpu `
            --dest ./packages

          # 3. 下載主程式及其所有依賴項
          # 使用 --no-cache-dir 確保抓到最新，並限制為僅下載 (download) 不安裝
          pip download "transparent-background[gui]" --dest ./packages

      - name: Create Zip Archive
        shell: pwsh
        run: |
          Compress-Archive -Path ./packages/* -DestinationPath transparent_bg_wheels.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-cpu-wheels
          path: transparent_bg_wheels.zip
          retention-days: 5
