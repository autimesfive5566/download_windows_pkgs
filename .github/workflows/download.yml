name: Download Packages
on:
  workflow_dispatch:
    inputs:
      package_names:
        description: '請輸入要下載的套件名稱 (空格隔開)'
        required: true
        default: 'langgraph langchain-litellm'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Pip Download
        run: |
          mkdir python_pkgs
          python -m pip install --upgrade pip
          # 使用 ${{ github.event.inputs.package_names }} 來讀取你輸入的內容
          pip download ${{ github.event.inputs.package_names }} -d python_pkgs

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # 動態命名 Artifact（可選），方便區分
          name: python-packages-artifact
          path: python_pkgs/
